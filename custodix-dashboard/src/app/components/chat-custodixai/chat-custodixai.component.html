<div class="ai-chat-page">
  <div class="chat-container">

    <!-- HEADER -->
    <header class="chat-header">
      <div class="header-info">
        <div class="ai-avatar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5z" fill="url(#grad1)"/>
            <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="titles">
          <h2>Custodix AI</h2>
          <span class="badge">Powered by Llama-3 & FAISS</span>
        </div>
      </div>
      <button class="header-action" title="Nouvelle discussion" (click)="messages = [messages[0]]">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
    </header>

    <!-- MESSAGES AREA -->
    <div class="chat-messages" #scrollMe>

      <div *ngFor="let msg of messages" class="message-wrapper" [ngClass]="msg.type">

        <div class="message-avatar" *ngIf="msg.type === 'bot'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/>
          </svg>
        </div>

        <div class="message-content">
          <div class="text-bubble" [class.error-bubble]="msg.error">
            {{ msg.text }}
          </div>

          <!-- S'il y a des résultats sous forme de tableau (liste) -->
          <div class="results-table-container" *ngIf="msg.columns && msg.results && msg.results.length > 0">
            <table class="results-table">
              <thead>
                <tr>
                  <th *ngFor="let col of msg.columns">{{ col }}</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let row of msg.results">
                  <td *ngFor="let col of msg.columns">{{ row[col] !== null ? row[col] : 'NULL' }}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>

      <!-- LOADER (quand l'IA réfléchit) -->
      <div class="message-wrapper bot" *ngIf="isLoading">
        <div class="message-avatar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="spin-icon" stroke="currentColor" stroke-width="2">
             <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
        </div>
        <div class="message-content">
          <div class="text-bubble typing-bubble">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

    </div>

    <!-- INPUT AREA -->
    <div class="chat-input-wrapper">
      <input type="text"
             [(ngModel)]="question"
             (keyup.enter)="sendMessage()"
             [disabled]="isLoading"
             placeholder="Posez une question sur vos tables (ex: Combien d'EAI aujourd'hui ?)..."
             class="chat-input" />
      <button class="send-btn" (click)="sendMessage()" [disabled]="!question.trim() || isLoading">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

  </div>
</div>
