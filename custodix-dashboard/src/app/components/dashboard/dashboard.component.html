<div class="layout">

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="navbar-left">
      <!-- Hamburger Button -->
      <button class="hamburger" (click)="toggleSidebar()" [class.is-open]="sidebarOpen()" title="Afficher / Masquer le menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">Custodix</span>
        <span class="logo-badge">PRO</span>
      </div>
    </div>

    <div class="navbar-center">
      <span class="nav-subtitle">VERMEG — Supervision des flux financiers</span>
    </div>

    <div class="navbar-right">
      <!-- Toggle Dark / Light -->
      <button class="theme-toggle" (click)="themeService.toggle()" [title]="themeService.isDark() ? 'Mode clair' : 'Mode sombre'">
        <span class="theme-toggle-track" [class.light]="!themeService.isDark()">
          <span class="theme-toggle-thumb">
            <span class="theme-icon">{{ themeService.isDark() ? '🌙' : '☀️' }}</span>
          </span>
        </span>
        <span class="theme-label">{{ themeService.isDark() ? 'Dark' : 'Light' }}</span>
      </button>

      <!-- Avatar utilisateur -->
      <div class="user-avatar" title="VERMEG User">VG</div>
    </div>
  </nav>

  <div class="main">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" [class.collapsed]="!sidebarOpen()">
      <div class="sidebar-inner">
        <div class="sidebar-section-label">Navigation</div>
        <ul class="sidebar-nav">

          <!-- Dashboard Overview -->
          <li>
            <a routerLink="overview" routerLinkActive="active" class="nav-item">
              <span class="nav-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <span class="nav-label">Dashboard</span>
            </a>
          </li>

          <!-- Flow Flow -->
          <li>
            <a routerLink="flows" routerLinkActive="active" class="nav-item">
              <span class="nav-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <span class="nav-label">Flow Flow</span>
              <span class="nav-badge">Live</span>
            </a>
          </li>

          <!-- File In -->
          <li>
            <a class="nav-item nav-item--soon">
              <span class="nav-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <polyline points="7 10 12 15 17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="nav-label">File In</span>
              <span class="nav-soon">Bientôt</span>
            </a>
          </li>

          <!-- File Out -->
          <li>
            <a class="nav-item nav-item--soon">
              <span class="nav-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="nav-label">File Out</span>
              <span class="nav-soon">Bientôt</span>
            </a>
          </li>

          <!-- EAI Header -->
          <li>
            <a routerLink="eai-header" routerLinkActive="active" class="nav-item">
              <span class="nav-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <polyline points="17 1 21 5 17 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M3 11V9a4 4 0 0 1 4-4h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <polyline points="7 23 3 19 7 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M21 13v2a4 4 0 0 1-4 4H3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="nav-label">EAI Header</span>
              <span class="nav-badge">New</span>
            </a>
          </li>

          <!-- Custodix AI -->
          <li>
            <a routerLink="custodix-ai" routerLinkActive="active" class="nav-item">
              <span class="nav-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M8.5 15h7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <span class="nav-label">Custodix AI</span>
              <span class="nav-badge" style="background: linear-gradient(135deg, #6366f1, #a855f7);">IA</span>
            </a>
          </li>

        </ul>

        <div class="sidebar-footer">
          <div class="sidebar-footer-info">
            <span class="status-dot"></span>
            <span class="sidebar-footer-text">API connectée</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- ===== CONTENU PRINCIPAL ===== -->
    <main class="content">
      <router-outlet />
    </main>

  </div>
</div>
